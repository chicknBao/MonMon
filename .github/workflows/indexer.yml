name: indexer-snapshot

on:
  schedule:
    # Hourly snapshots for PoC
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    concurrency:
      group: indexer-snapshot
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build indexer
        run: npm -w apps/indexer run build

      - name: Run snapshot (migrate + snapshot)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONAD_RPC_URL: ${{ secrets.MONAD_RPC_URL }}
          MONAD_CHAIN_ID: "143"
          # Uniswap v4 PoC pools (poolIds)
          UNISWAP_V4_POOL_MANAGER: "0x188d586ddcf52439676ca21a244753fa19f9ea8e"
          UNISWAP_V4_STATE_VIEW: "0x77395f3b2e73ae90843717371294fa97cc419d64"
          UNISWAP_V4_POOL_IDS: "0x18a9fc874581f3ba12b7898f80a683c66fd5877fd74b26a85ba9a3a79c549954,0xadaf30776f551bccdfb307c3fd8cdec198ca9a852434c8022ee32d1ccedd8219"
          # Ensure indexer runs once and exits in CI
          SNAPSHOT_CRON_SCHEDULE: ""
          # Keep PoC runs fast on free tiers
          DISCOVERY_LOOKBACK_BLOCKS: "50000"
          DISCOVERY_MAX_POOLS: "120"
          SNAPSHOT_BATCH_SIZE: "25"
          BAND_BPS_LIST: "25,50,100,200,500"
        run: npm -w apps/indexer run start

